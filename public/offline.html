<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#F5F1EA" />
    <title>Crunch Watcher Offline</title>
    <style>
      :root {
        color-scheme: light;
        background: #f5f1ea;
        color: #111111;
        font-family: Arial, Helvetica, sans-serif;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        border: 2px solid #111111;
        background: #fbf8f1;
        padding: 24px;
        text-align: center;
      }
      h1 {
        margin: 0;
        font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 34px;
      }
      p {
        margin: 12px 0 0;
        color: #4f4a43;
        font-weight: 700;
        line-height: 1.5;
      }
      a {
        display: inline-block;
        margin-top: 18px;
        border: 2px solid #111111;
        background: #111111;
        color: #f5f1ea;
        padding: 12px 16px;
        text-decoration: none;
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Crunch Watcher</h1>
      <p>You are offline. Reopen the app when your connection returns, or use cached pages if they were already loaded on this device.</p>
      <a href="/">Retry</a>
    </main>
  </body>
</html>
